    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "altro",
        "alternateName": "Altro AI",
        "url": "https://altro.build",
        "logo": "https://altro.build/og-image.png",
        "description": "altro ships custom internal tools, automations, and AI agents for 10–200 person ops teams. Fixed scope, working deliverable in 2–4 weeks.",
        "email": "altroaiteam@gmail.com",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "IL"
        },
        "areaServed": "Worldwide",
        "knowsAbout": ["Internal Tools", "Process Automation", "AI Agents", "API Integrations", "Custom Web Applications"]
      }
    </script>

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "altro",
        "url": "https://altro.build",
        "inLanguage": ["en", "he"]
      }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Do we need to replace our existing systems?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. We build on top of what you already use. Your team keeps working in the same tools — we just make them faster and better connected. No migrations, no disruption."
            }
          },
          {
            "@type": "Question",
            "name": "Is our business data safe?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your data stays in your systems. We connect to them through secure, official APIs — the same way your bank connects to your accounting software. We never store your business data ourselves."
            }
          },
          {
            "@type": "Question",
            "name": "Why not just use off-the-shelf software?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Generic software is built for everyone, which means it fits nobody perfectly. Your team ends up working around its limitations. We build exactly what you need and nothing you don't — so it actually gets used."
            }
          },
          {
            "@type": "Question",
            "name": "Will we be dependent on you forever?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You own everything we build: the code, the system, the data. We're happy to stay on for support, but the moment we're done you could hand it to any developer in the world. No black boxes, ever."
            }
          }
        ]
      }
    </script>

    <!-- Analytics (self-built, consent-gated) -->
    <script>
      (function () {
        var KEY = 'altro_analytics_consent'
        function load() {
          var s = document.createElement('script')
          s.src = '/track.js'; s.defer = true
          document.head.appendChild(s)
        }
        if (localStorage.getItem(KEY) === 'granted') { load(); return }
        window.__altroLoadAnalytics = load
      })()
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
